<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg   { fill: #2d2926; }
        .mark { fill: #6b9ec5; }
      }
    </style>
  </defs>
  <!-- Warm cream background -->
  <rect class="bg" width="32" height="32" rx="6" fill="#f0ece3"/>
  <!-- Left + -->
  <rect class="mark" x="4"  y="14.5" width="11" height="3" rx="1.5" fill="#226699"/>
  <rect class="mark" x="8"  y="10.5" width="3"  height="11" rx="1.5" fill="#226699"/>
  <!-- Right + -->
  <rect class="mark" x="17" y="14.5" width="11" height="3" rx="1.5" fill="#226699"/>
  <rect class="mark" x="21" y="10.5" width="3"  height="11" rx="1.5" fill="#226699"/>
</svg>
